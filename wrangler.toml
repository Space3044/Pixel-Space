# Cloudflare Pages 配置：本地 `wrangler pages dev` 与生产部署共用一份。
# 阶段 4 验收前需要先 `wrangler login` + `wrangler d1 create imgbed`，把返回的
# database_id 填到下方 [[d1_databases]] 块。

name = "imgbed"
compatibility_date = "2026-01-15"
pages_build_output_dir = "dist"

# D1 数据库 binding：Pages Functions 里通过 env.DB 访问。
[[d1_databases]]
binding = "DB"
database_name = "imgbed"
database_id = "local-dev-placeholder"  # 本地任意非空字符串即可；部署前在 Dashboard 建库后回填真实 ID
migrations_dir = "db/migrations"

[vars]
# 压缩图公开访问的基础 URL。部署时在 Pages 控制台覆盖为真实域名。
PUBLIC_BASE_URL = "https://imgbed.local"
